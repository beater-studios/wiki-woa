site_name: Wiki — World of Aincrad
site_description: Documentação oficial do World of Aincrad
site_url: https://wiki.swordartonline.com.br/
docs_dir: docs

theme:
  name: material
  custom_dir: overrides
  language: pt-BR
  logo: assets/logo.png        # substitua pelo arquivo de logo em docs/assets/
  favicon: assets/logo.png     # ícone na aba do navegador
  palette:
    - scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/easter-egg.js

plugins:
  - search:
      lang: pt
  - redirects:
      redirect_maps:
        # Paths antigos sem categoria
        'reset-de-conta.md': 'personagem/reset-de-conta.md'
        'progressao/reset-de-conta.md': 'personagem/reset-de-conta.md'
        'combate/hostilidade-dos-monstros.md': 'combate/natureza-dos-monstros.md'
        'geral/respawn-dos-chefes-de-andar.md': 'exploracao/respawn-dos-chefes.md'
        'geral/wcoin-moeda-especial.md': 'economia/wcoin.md'
        'geral/modo-aventura.md': 'exploracao/modo-aventura.md'
        # Paths antigos com prefixo /v/ (seção "eventos" → "changelog")
        'v/eventos/2023/09-11-or-0.6.md': 'changelog/2023/09-11-or-0.6.md'
        'v/eventos/2023/10-12-or-0.9.md': 'changelog/2023/10-12-or-0.9.md'
        'v/eventos/2023/12-11-or-0.7.md': 'changelog/2023/12-11-or-0.7/README.md'
        'v/eventos/2023/13-11-or-0.8.md': 'changelog/2023/13-11-or-0.8.md'
        'v/eventos/2023/20-10-or-0.1.md': 'changelog/2023/20-10-or-0.1.md'
        'v/eventos/2023/21-10-or-0.1.1.md': 'changelog/2023/21-10-or-0.1.1.md'
        'v/eventos/2023/25-10-or-0.2.md': 'changelog/2023/25-10-or-0.2.md'
        'v/eventos/2023/26-10-or-0.3.md': 'changelog/2023/26-10-or-0.3.md'
        'v/eventos/2023/26-12-or-1.0.md': 'changelog/2023/26-12-or-1.0.md'
        'v/eventos/2023/27-12-or-1.1.md': 'changelog/2023/27-12-or-1.1.md'
        'v/eventos/2023/28-10-or-0.4.md': 'changelog/2023/28-10-or-0.4.md'
        'v/eventos/2023/28-12-or-1.2.md': 'changelog/2023/28-12-or-1.2/README.md'
        'v/eventos/2023/29-10-or-0.5.md': 'changelog/2023/29-10-or-0.5.md'
        'v/eventos/2024/06-01-or-1.3.md': 'changelog/2024/06-01-or-1.3.md'
        'v/eventos/2024/24-02-or-1.4.md': 'changelog/2024/24-02-or-1.4/README.md'
        'v/eventos/combate/desarme.md': 'combate/desarme.md'
        'v/eventos/combate/hostilidade-dos-monstros.md': 'combate/natureza-dos-monstros.md'
        'v/eventos/caca-dos-chefes/conclusao-da-missao-e-recompensas.md': 'changelog/2024/08-04-or-1.5.md'
  - rss:
      match_path: "changelog/.*"
      date_from_meta:
        as_creation: date
      use_git: true
      enabled: true
      abstract_chars_count: 160
      feed_ttl: 1440
      image: https://wiki.swordartonline.com.br/assets/logo.png

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Início: index.md
  - Mecânicas:
    - Combate:
      - Sistema de Batalha: combate/sistema-de-batalha.md
      - Chefes de Andar: combate/chefes-de-andar.md
      - Bestiário: combate/bestario.md
      - Drop de Itens: combate/drop-de-itens.md
      - Natureza dos Monstros: combate/natureza-dos-monstros.md
      - Desarme: combate/desarme.md
    - Exploração:
      - Andares: exploracao/andares.md
      - Modo Aventura: exploracao/modo-aventura.md
      - Respawn dos Chefes: exploracao/respawn-dos-chefes.md
  - Personagem:
    - Atributos: personagem/atributos.md
    - Habilidades: personagem/skills.md
    - XP e Nível: personagem/xp-e-nivel.md
    - Missões: personagem/missoes.md
    - Itens de Regeneração: personagem/itens-de-regeneracao.md
    - Reset de Conta: personagem/reset-de-conta.md
  - Economia:
    - Equipamentos: economia/equipamentos.md
    - Mercado: economia/mercado.md
    - wCoin: economia/wcoin.md
    - Cardinal Code: economia/cardinal-code.md
  - Social:
    - Ranking: social/ranking.md
    - Duelos: social/duelos.md
  - Informações:
    - Manutenções Programadas: informacoes/manutencoes.md
    - Configurações: informacoes/configuracoes.md
